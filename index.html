<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignAudio | AI 제품 디자인 아카이브</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-xl font-bold tracking-tight text-slate-900">📐 DesignAudio</span>
        <span class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-md font-medium">Product Design</span>
      </div>
      
      <div>
        <button id="btn-login" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition shadow-xs">
          구글 로그인
        </button>
        <div id="user-info" class="hidden flex items-center gap-4">
          <span id="user-name" class="text-sm font-semibold text-slate-700"></span>
          <button id="btn-logout" class="text-sm text-red-500 hover:underline font-medium">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <section class="lg:col-span-7 bg-white p-8 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
      <div>
        <h2 class="text-xl font-bold text-slate-900 mb-2">💡 AI 디자인 컨셉 & 오디오 생성기</h2>
        <p class="text-sm text-slate-500 mb-6">제품 아이디어를 입력하면 AI가 CMF와 디자인 가이드를 제안하고 오디오 파일로 변환합니다.</p>

        <div class="grid grid-cols-3 gap-3 mb-6">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-500">품질 선택</label>
            <select id="modelSelect" class="w-full h-11 px-3 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:outline-none focus:border-slate-900">
              <option value="tts-1">tts-1 (빠름)</option>
              <option value="tts-1-hd">tts-1-hd (고품질)</option>
            </select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-500">보이스 타입</label>
            <select id="voiceSelect" class="w-full h-11 px-3 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:outline-none focus:border-slate-900">
              <option value="nova">nova (추천: 밝은 여성)</option>
              <option value="shimmer">shimmer (지적 여성)</option>
              <option value="echo">echo (차분한 남성)</option>
              <option value="onyx">onyx (묵직한 남성)</option>
              <option value="alloy">alloy (중성적)</option>
            </select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-slate-500">말하기 속도</label>
            <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" class="w-full h-11 px-3 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:outline-none focus:border-slate-900" />
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-bold text-slate-500 mb-1">디자인 영감/설명 입력</label>
          <textarea id="textInput" placeholder="예시: 친환경 대나무 소재를 활용한 미니멀한 가습기 디자인. 센서가 부착되어 물 양을 시각적으로 투명하게 보여주는 20대 타겟의 데스크테리어 제품." class="w-full min-h-[160px] p-4 border border-slate-200 rounded-xl text-base focus:outline-none focus:border-slate-900 leading-relaxed"></textarea>
        </div>

        <div class="flex gap-3 justify-end">
          <button id="clearBtn" class="bg-slate-100 text-slate-600 px-5 py-3 rounded-xl font-medium text-sm hover:bg-slate-200 transition">초기화</button>
          <button id="makeBtn" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-indigo-700 transition shadow-sm">✨ 디자인 음성 생성</button>
        </div>

        <div id="status" class="mt-4 text-xs font-medium text-indigo-600 min-h-[16px]"></div>

        <div id="resultBox" class="mt-6 p-5 bg-slate-50 rounded-xl border border-slate-200 hidden animate-fade-in">
          <div class="font-bold text-slate-800 text-sm mb-2">🎧 생성된 디자인 오디오 브리핑</div>
          <audio id="audioPlayer" controls class="w-full mb-4"></audio>
          
          <div class="flex gap-2 justify-end">
            <a id="downloadLink" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-300 transition" href="#" download>mp3 다운로드</a>
            <button id="btn-save" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-700 transition shadow-xs">💾 클라우드 아카이브에 저장</button>
          </div>
        </div>
      </div>
    </section>

    <section class="lg:col-span-5 bg-white p-8 rounded-2xl border border-slate-200 shadow-xs flex flex-col">
      <h2 class="text-xl font-bold text-slate-900 mb-2">📂 My Design Archive</h2>
      <p class="text-sm text-slate-500 mb-6">데이터베이스에 안전하게 기록된 나만의 디자인 영감 노트입니다.</p>

      <div id="login-required-msg" class="text-center py-20 text-slate-400 text-sm border-2 border-dashed border-slate-100 rounded-xl">
        구글 로그인 후 나만의 디자인 무드 보드를 아카이브해 보세요.
      </div>

      <div id="idea-list" class="space-y-4 max-h-[520px] overflow-y-auto hidden">
        </div>
    </section>

  </main>

  <script type="module">
    // Firebase 핵심 모듈 CDN 가져오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. [필수] 본인의 Firebase 웹 앱 설정 값으로 교체하세요!
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // 2. [필수] 본인이 배포한 Google Apps Script(GAS) 웹 앱 URL로 교체하세요!
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_APPS_SCRIPT_URL_HERE/exec';

    // 글로벌 데이터 상태 관리 변수
    let currentUser = null;
    let currentSavedBase64 = ""; 

    // DOM 요소 선택
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    const userInfo = document.getElementById('user-info');
    const userName = document.getElementById('user-name');
    const loginRequiredMsg = document.getElementById('login-required-msg');
    const ideaList = document.getElementById('idea-list');
    
    const textInput = document.getElementById('textInput');
    const modelSelect = document.getElementById('modelSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeBtn = document.getElementById('makeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');
    const btnSave = document.getElementById('btn-save');

    // 이벤트 리스너 연결
    makeBtn.addEventListener('click', makeSpeech);
    clearBtn.addEventListener('click', clearPage);
    btnLogin.addEventListener('click', login);
    btnLogout.addEventListener('click', logout);
    btnSave.addEventListener('click', saveToFirestore);

    // ==========================================
    // 기능 1: Firebase Authentication (유저 관리)
    // ==========================================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        btnLogin.classList.add('hidden');
        userInfo.classList.remove('hidden');
        userName.textContent = `${user.displayName} 디자이너`;
        loginRequiredMsg.classList.add('hidden');
        ideaList.classList.remove('hidden');
        
        // 로그인 성공 시 해당 유저 데이터 불러오기 시작
        loadMyIdeas(user.uid);
      } else {
        currentUser = null;
        btnLogin.classList.remove('hidden');
        userInfo.classList.add('hidden');
        loginRequiredMsg.classList.remove('hidden');
        ideaList.classList.add('hidden');
        ideaList.innerHTML = '';
      }
    });

    async function login() {
      try { await signInWithPopup(auth, provider); } 
      catch (error) { alert("구글 로그인에 실패했습니다: " + error.message); }
    }

    function logout() { signOut(auth); }

    // ==========================================
    // 기능 2: OpenAI TTS API 연동 (via GAS)
    // ==========================================
    async function makeSpeech() {
      const text = textInput.value.trim();
      const model = modelSelect.value;
      const voice = voiceSelect.value;
      const speed = Number(speedInput.value || 1.0);

      if (!text) { alert('음성 가이드로 변환할 디자인 아이디어를 적어주세요.'); return; }
      if (speed < 0.25 || speed > 4.0) { alert('속도는 0.25 ~ 4.0 사이여야 합니다.'); return; }

      try {
        setLoading(true);
        resultBox.classList.add('hidden');
        statusBox.textContent = '🚀 Google Apps Script를 거쳐 OpenAI TTS 음성을 생성하는 중...';

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text, model, voice, speed })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (!data.audioBase64) throw new Error('음성 데이터 추출에 실패했습니다.');

        currentSavedBase64 = data.audioBase64; // DB 저장용 전역변수에 세팅
        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');

        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = `design-brief-${Date.now()}.mp3`;
        
        resultBox.classList.remove('hidden');
        statusBox.textContent = '✅ 디자인 브리핑 오디오 생성 완료!';
      } catch (error) {
        console.error(error);
        statusBox.textContent = '❌ 음성 생성에 실패했습니다.';
        alert('에러 발생: ' + error.message);
      } finally {
        setLoading(false);
      }
    }

    // ==========================================
    // 기능 3: Firebase Firestore (DB 데이터 연동)
    // ==========================================
    async function saveToFirestore() {
      if (!currentUser) { alert('아카이브 저장은 로그인이 필요한 서비스입니다.'); return; }
      if (!textInput.value.trim() || !currentSavedBase64) { alert('저장할 오디오 데이터가 없습니다.'); return; }

      try {
        statusBox.textContent = '💾 Firestore 클라우드에 영감 노트 동기화 중...';
        await addDoc(collection(db, "design_archives"), {
          userId: currentUser.uid,
          text: textInput.value.trim(),
          audioBase64: currentSavedBase64,
          createdAt: new Date()
        });
        alert('성공적으로 디자인 아카이브에 기록되었습니다!');
      } catch (error) {
        alert('Firestore 저장 오류: ' + error.message);
      } finally {
        statusBox.textContent = '';
      }
    }

    // 내 아카이브 실시간 화면 렌더링
    function loadMyIdeas(userId) {
      const q = query(
        collection(db, "design_archives"),
        where("userId", "==", userId),
        orderBy("createdAt", "desc")
      );

      onSnapshot(q, (snapshot) => {
        ideaList.innerHTML = '';
        if (snapshot.empty) {
          ideaList.innerHTML = '<p class="text-center py-10 text-xs text-slate-400">아직 저장된 디자인 파일이 없습니다.</p>';
          return;
        }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const docId = docSnap.id;
          const targetAudioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');

          const card = document.createElement('div');
          card.className = "p-4 bg-slate-50 rounded-xl border border-slate-200 relative flex flex-col gap-2";
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <span class="text-[11px] text-slate-400 font-mono">${new Date(data.createdAt.seconds*1000).toLocaleDateString()}</span>
              <button class="text-xs text-slate-400 hover:text-red-500 font-bold btn-delete" data-id="${docId}">삭제</button>
            </div>
            <p class="text-xs text-slate-700 font-medium leading-relaxed bg-white p-2.5 rounded-lg border border-slate-100">${data.text}</p>
            <audio src="${targetAudioUrl}" controls class="w-full h-8 mt-1"></audio>
          `;
          ideaList.appendChild(card);
        });

        // 삭제 버튼 동적 이벤트 할당
        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.getAttribute('data-id');
            if(confirm('이 기록을 클라우드 아카이브에서 삭제하시겠습니까?')) {
              await deleteDoc(doc(db, "design_archives", id));
            }
          });
        });
      });
    }

    // 유틸리티 함수들
    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) { byteNumbers[i] = slice.charCodeAt(i); }
        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }

    function setLoading(isLoading) {
      makeBtn.disabled = isLoading;
      makeBtn.textContent = isLoading ? '생성 중...' : '✨ 디자인 음성 생성';
    }

    function clearPage() {
      textInput.value = '';
      statusBox.textContent = '';
      audioPlayer.removeAttribute('src');
      resultBox.classList.add('hidden');
      currentSavedBase64 = "";
    }
  </script>
</body>
</html>
