<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignAI - 제품 디자이너를 위한 아이디어 파트너</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .hidden { display: none !important; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .btn-secondary { background-color: #64748b; }
        .btn-speak { background-color: #10b981; }
        .idea-item {
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 0 6px 6px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>💡 DesignAI</h1>
        <div id="auth-status">
            </div>
    </header>

    <div id="auth-section" class="card">
        <h3>🔒 디자이너 로그인</h3>
        <p>인공지능 가이드 및 아이디어 저장을 위해 로그인해주세요.</p>
        <input type="email" id="auth-email" placeholder="이메일 주소">
        <input type="password" id="auth-password" placeholder="비밀번호">
        <button id="btn-login">로그인</button>
        <button id="btn-signup" class="btn-secondary">회원가입</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="card">
            <h3>🎨 AI 제품 디자인 컨셉 Generator</h3>
            
            <label for="product-type">**개발할 제품군**</label>
            <input type="text" id="product-type" placeholder="예: 친환경 텀블러, 스마트 워치, 1인 가구용 공기청정기">

            <label for="design-concept">**디자인 핵심 키워드/방향성**</label>
            <textarea id="design-concept" rows="3" placeholder="예: 미니멀리즘, 생분해성 소재 활용, CMF(색상/재질/마감) 강조"></textarea>

            <button id="btn-generate">AI 디자인 컨셉 생성</button>
        </div>

        <div id="result-card" class="card hidden">
            <h3>✨ AI 제안 디자인 컨셉</h3>
            <p id="ai-response-text" style="white-space: pre-wrap; line-height: 1.6;"></p>
            <div style="margin-top: 15px;">
                <button id="btn-tts" class="btn-speak">🔊 오디오로 듣기 (TTS)</button>
                <button id="btn-save" class="btn-secondary">📁 내 아이디어 보관함에 저장</button>
            </div>
        </div>

        <div class="card">
            <h3>📁 저장된 디자인 아이디어 아카이브</h3>
            <div id="idea-history-list">
                <p style="color: #94a3b8;">저장된 아이디어가 없습니다.</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ [필수] 본인의 Firebase 프로젝트 설정값으로 교체하세요!
   const firebaseConfig = {
  apiKey: "AIzaSyA5iOkWsSu9CC7lHWmyzzezgUawKvj2ylE",
  authDomain: "daehyun-671a9.firebaseapp.com",
  databaseURL: "https://daehyun-671a9-default-rtdb.firebaseio.com",
  projectId: "daehyun-671a9",
  storageBucket: "daehyun-671a9.firebasestorage.app",
  messagingSenderId: "715097973145",
  appId: "1:715097973145:web:4a079a501b77edb4e0b308",
  measurementId: "G-HFE5Q6V6J0"
};

    // ⚠️ [필수] 본인의 Gemini API 키를 입력하세요!
    const GEMINI_API_KEY = "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";

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 전역 변수 설정
    let currentUser = null;
    let latestAIResult = "";

    // --- [1] Firebase Authentication (인증 기능) ---
    const authSection = document.getElementById('auth-section');
    const mainSection = document.getElementById('main-section');
    const authStatus = document.getElementById('auth-status');

    // 회원가입
    document.getElementById('btn-signup').addEventListener('click', async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        try {
            await createUserWithEmailAndPassword(auth, email, password);
            alert('회원가입이 완료되었습니다!');
        } catch (error) {
            alert('회원가입 실패: ' + error.message);
        }
    });

    // 로그인
    document.getElementById('btn-login').addEventListener('click', async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            alert('로그인 실패: ' + error.message);
        }
    });

    // 인증 상태 감시자 (로그인 상태에 따라 화면 전환)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            authSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            authStatus.innerHTML = `<span>디자이너: <b>${user.email}</b></span> <button id="btn-logout" class="btn-secondary" style="padding:5px 10px; margin-left:10px;">로그아웃</button>`;
            
            // 로그아웃 버튼 이벤트 리스너 바인딩
            document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
            
            // 로그인 완료 후 해당 유저의 데이터 불러오기 실시간 연동
            loadSavedIdeas(user.uid);
        } else {
            currentUser = null;
            authSection.classList.remove('hidden');
            mainSection.classList.add('hidden');
            authStatus.innerHTML = '';
        }
    });


    // --- [2] 생성형 AI 연동 (Gemini API) ---
    document.getElementById('btn-generate').addEventListener('click', async () => {
        const productType = document.getElementById('product-type').value;
        const designConcept = document.getElementById('design-concept').value;

        if(!productType || !designConcept) {
            alert('제품군과 디자인 방향성을 모두 적어주세요!');
            return;
        }

        document.getElementById('btn-generate').innerText = "AI 아이디어 스케칭 중...";
        
        // 디자이너 맞춤형 페르소나 부여 프롬프트
        const prompt = `너는 세계적인 제품 디자이너야. 제품군: [${productType}], 컨셉 방향성: [${designConcept}]에 부합하는 혁신적이고 심미적인 제품 디자인 컨셉 제안서를 작성해줘. 
        제안서에는 1. 제품 디자인 컨셉 명칭, 2. 형태 및 구조적 특징, 3. 추천 CMF(컬러, 소재, 마감)가 꼭 포함되게 전문적이고 매끄러운 한국어로 작성해줘.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            latestAIResult = data.candidates[0].content.parts[0].text;
            
            // 결과 화면 표시
            document.getElementById('ai-response-text').innerText = latestAIResult;
            document.getElementById('result-card').classList.remove('hidden');
        } catch (error) {
            console.error(error);
            alert('AI 연동 중 에러가 발생했습니다.');
        } finally {
            document.getElementById('btn-generate').innerText = "AI 디자인 컨셉 생성";
        }
    });


    // --- [3] TTS (Text-to-Speech) 기능 ---
    document.getElementById('btn-tts').addEventListener('click', () => {
        if (!latestAIResult) return;
        
        // 브라우저 내장 Web Speech API 활용 (별도 API 키 불필요)
        // 작동 오류 방지를 위해 기존 말하는 중인 음성이 있다면 취소
        window.speechSynthesis.cancel(); 

        const utterance = new SpeechSynthesisUtterance(latestAIResult);
        utterance.lang = 'ko-KR'; // 한국어 설정
        utterance.rate = 1.0;     // 재생 속도
        
        window.speechSynthesis.speak(utterance);
    });


    // --- [4] Firebase Firestore (데이터 연동) ---
    // 데이터 저장하기
    document.getElementById('btn-save').addEventListener('click', async () => {
        if (!currentUser || !latestAIResult) return;

        const productType = document.getElementById('product-type').value;

        try {
            await addDoc(collection(db, "design_ideas"), {
                userId: currentUser.uid,
                productType: productType,
                ideaText: latestAIResult,
                createdAt: new Date()
            });
            alert('아이디어 아카이브에 성공적으로 저장되었습니다!');
        } catch (e) {
            console.error("Error adding document: ", e);
        }
    });

    // 해당 유저가 저장한 데이터 실시간(onSnapshot)으로 불러와 뿌려주기
    function loadSavedIdeas(userId) {
        const q = query(collection(db, "design_ideas"), where("userId", "==", userId));
        
        onSnapshot(q, (querySnapshot) => {
            const listContainer = document.getElementById('idea-history-list');
            listContainer.innerHTML = ''; // 초기화

            if(querySnapshot.empty) {
                listContainer.innerHTML = '<p style="color: #94a3b8;">저장된 아이디어가 없습니다.</p>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const itemDiv = document.createElement('div');
                itemDiv.className = 'idea-item';
                itemDiv.innerHTML = `
                    <strong>📦 제품군: ${data.productType}</strong>
                    <p style="font-size: 14px; color: #475569; white-space: pre-wrap;">${data.ideaText}</p>
                `;
                listContainer.appendChild(itemDiv);
            });
        });
    }
</script>
</body>
</html>
